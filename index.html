<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李東展的個人網頁</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333333;
            --card-bg: #ffffff;
            --primary-color: #4CAF50;
        }

        [data-theme="dark"] {
            --bg-color: #1e1e1e;
            --text-color: #f4f4f9;
            --card-bg: #2d2d2d;
            --primary-color: #66bb6a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
            transition: background-color 0.3s;
        }

        h1 {
            margin-top: 0;
        }

        .skills {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .skill-tag {
            background-color: var(--primary-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        button {
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
            margin-top: 20px;
        }

        button:hover {
            opacity: 0.8;
        }

        #time-display {
            margin-top: 15px;
            font-size: 0.85em;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>113021165 東展</h1>
        <p>這是作業網址</p>

        <div class="skills">
            <span class="skill-tag">JavaScript</span>
           
        </div>

        <button id="theme-toggle">切換深色/淺色模式</button>

        <div id="time-display">載入時間中...</div>
    </div>

    <script>
        // 1. 深色模式切換功能
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        });

        // 2. 即時時間更新功能
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleString('zh-TW', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('time-display').textContent = `現在時間：${timeString}`;
        }

        // 初始化時間並每秒更新
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>

</html>
